<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AniStream API</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center;
        background: #0a0a0a; color: #fff;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      .card { text-align: center; padding: 32px; }
      h1 { font-size: 28px; margin: 0 0 6px; }
      .accent { color: #ff4124; }
      p { color: #9a9aa0; margin: 0 0 24px; }
      a {
        display: inline-block; margin: 4px; padding: 8px 14px; border-radius: 10px;
        background: #1c1c1e; color: #ff7a3d; text-decoration: none; font-size: 14px;
      }
      a:hover { background: #2a2a2c; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1><span class="accent">Ani</span>Stream API</h1>
      <p>Hono scraper API — anime · donghua · film. Status: running ✅</p>
      <div>
        <a href="/api/health">/api/health</a>
        <a href="/api/home">/api/home</a>
        <a href="/api/donghua/home">/api/donghua/home</a>
        <a href="/api/film/home">/api/film/home</a>
      </div>
    </div>
  </body>
</html>
